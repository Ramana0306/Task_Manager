services:

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: taskmanager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmanager_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      JWT_SECRET: ThisIsA32PlusCharacterLongSecretKeyForJWTSigning123
      APP_CORS_ALLOWED_ORIGINS: http://localhost
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://backend:8080/api
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres-data: